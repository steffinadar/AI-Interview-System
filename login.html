<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Interview System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#1d2671,#c33764);
        }

        .login-container{
            width:350px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            text-align:center;
        }

        .login-container h1{
            margin-bottom:10px;
            color:#1d2671;
        }

        .login-container p{
            margin-bottom:25px;
            color:gray;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#f1f1f1;
            font-size:16px;
        }

        .login-btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background: linear-gradient(135deg,#1d2671,#c33764);
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            transform:scale(1.05);
        }

    </style>
</head>

<body>

    <div class="login-container">

        <h1>AI Interview System</h1>
        <p>Login to Continue</p>

        <form action="/index" method="GET">

            <div class="input-box">
                <input type="text" placeholder="Enter Username" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Enter Password" required>
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

    </div>

</body>
</html>
