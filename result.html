<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Resume Result</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>

body{
    font-family:Poppins;
    background:linear-gradient(135deg,#0f172a,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.card{
    width:450px;
    padding:40px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    margin-bottom:20px;
}

.score{
    font-size:40px;
    color:#38bdf8;
    font-weight:bold;
}

.skills{
    margin-top:20px;
}

.skill{
    display:inline-block;
    background:#2563eb;
    padding:8px 12px;
    margin:5px;
    border-radius:10px;
    font-size:14px;
}

.btn{
    margin-top:25px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#06b6d4;
    color:white;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

    <h1>Resume Analysis Result</h1>

    <div class="score">
        {{ score }}%
    </div>

    <h3>Detected Skills</h3>

    <div class="skills">

        {% for s in skills %}
            <span class="skill">{{ s }}</span>
        {% endfor %}

    </div>

    <br>

    <a href="/upload">
        <button class="btn">Upload Another Resume</button>
    </a>
<div style="margin-top: 30px; text-align: center;">
    

    <a href="/interview" style="text-decoration: none;">

        <button style="
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;

            /* Gradient AI style */
            background: linear-gradient(135deg, #00c6ff, #0072ff);

            /* Shadow for premium look */
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);

            transition: all 0.3s ease;
        "
        onmouseover="this.style.transform='scale(1.08)'"
        onmouseout="this.style.transform='scale(1)'"
        >
            🚀 Start Mock Interview
        </button>

      </a>
<div style="text-align:center; margin-top: 20px;">

    <button onclick="downloadPDF()" style="
        padding: 14px 25px;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        color: white;
        background: linear-gradient(135deg, #ff2fe0, #dd2476);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    ">
        📄 Download Report PDF
    </button>

</div>
</div>


</div>

</body>
</html>

<script>
function downloadPDF() {
    window.print();
}
</script>
